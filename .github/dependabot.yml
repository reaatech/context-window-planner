  - package-ecosystem: "npm"
    directory: "/examples/conversation-management"
    schedule:
      interval: "weekly"
    versioning-strategy: increase
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "examples"
    allow:
      - dependency-type: "production"
        update-types:
          - "major"
      - dependency-type: "development"
        update-types:
          - "major"

  - package-ecosystem: "npm"
    directory: "/examples/custom-strategy"
    schedule:
      interval: "weekly"
    versioning-strategy: increase
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "examples"
    allow:
      - dependency-type: "production"
        update-types:
