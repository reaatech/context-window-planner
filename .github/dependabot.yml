version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    versioning-strategy: increase
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "root"
    allow:
      - dependency-type: "production"
        update-types:
          - "major"
      - dependency-type: "development"
        update-types:
          - "major"

  - package-ecosystem: "npm"
    directory: "/packages/core"
    schedule:
      interval: "weekly"
    versioning-strategy: increase
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "packages"
    allow:
      - dependency-type: "production"
        update-types:
          - "major"
      - dependency-type: "development"
        update-types:
          - "major"

  - package-ecosystem: "npm"
